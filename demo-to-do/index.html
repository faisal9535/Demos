<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faisal Task App</title>

    <link
      rel="stylesheet"
      href="styles/light-theme.css"
      media="(prefers-color-scheme: light), (prefers-color-scheme: no-preference)"
    />

    <link
      rel="stylesheet"
      href="styles/dark-theme.css"
      media="(prefers-color-scheme: dark)"
    />

    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/to-do-styles.css" />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>"
    />

    <style>
      body {
        background: #111827;
      }

      h1 {
        color: white;
      }

      .reminder-text {
        color: #9ca3af;
        font-size: 12px;
        margin-top: 8px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>📋 Faisal Task Manager</h1>

    <form>
      <div class="new-task-form" tabindex="0">
        <label for="new-task">➕ Add a task</label>

        <input
          id="new-task"
          autocomplete="off"
          type="text"
          placeholder="Add task with reminder"
          title="Click to start adding a task"
        />

        <input type="submit" value="➡️" />
      </div>

      <p class="reminder-text">
        ⏰ Reminder support enabled for upcoming tasks
      </p>

      <ul id="tasks"></ul>
    </form>

    <script src="to-do.js"></script>
  </body>
</html>
